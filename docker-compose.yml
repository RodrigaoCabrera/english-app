services:
  postgres:
    image: postgres:16-alpine
    container_name: english-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: english_user
      POSTGRES_PASSWORD: english_pass
      POSTGRES_DB: english_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
